# Application configuration (HOCON).
#
# Key-naming convention: HOCON keys must be camelCase to match the Scala field
# names that ZIO Config magnolia derives.  TypesafeConfig resolves ${?ENV_VAR}
# substitutions first, so environment-variable overrides still work.

http {
  host = "0.0.0.0"
  host = ${?HTTP_HOST}
  port = 8080
  port = ${?HTTP_PORT}
}

db {
  url      = "jdbc:postgresql://localhost:5432/photos_db"
  url      = ${?DB_URL}
  user     = "app_user"
  user     = ${?DB_USER}
  password = "dev_app_password"
  password = ${?DB_PASSWORD}
  poolSize = 10
  poolSize = ${?DB_POOL_SIZE}
}

auth {
  jwtSecret          = "dev-jwt-secret-change-in-production"
  jwtSecret          = ${?JWT_SECRET}
  tokenExpirySeconds = 3600
  tokenExpirySeconds = ${?TOKEN_EXPIRY_SECONDS}
  # Set to true to bypass real auth (development / POC environments only)
  mockMode           = false
  mockMode           = ${?AUTH_MOCK_MODE}
}

ingest {
  # "classpath:photos.csv" reads from the bundled resource inside the JAR
  csvPath = "classpath:photos.csv"
  csvPath = ${?INGEST_CSV_PATH}
  enabled = true
  enabled = ${?INGEST_ENABLED}
}

# Section name must also be camelCase to match AppConfig.defaultClient
defaultClient {
  clientId     = "dev-client"
  clientId     = ${?DEFAULT_CLIENT_ID}
  clientSecret = "dev-secret-change-me"
  clientSecret = ${?DEFAULT_CLIENT_SECRET}
}
