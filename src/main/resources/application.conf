# Application configuration (HOCON).
# All values can be overridden by environment variables (uppercase, dots → _).
# ZIO Config reads environment variables automatically via deriveConfig.

http {
  host = "0.0.0.0"
  host = ${?HTTP_HOST}
  port = 8080
  port = ${?HTTP_PORT}
}

db {
  url       = "jdbc:postgresql://localhost:5432/photos_db"
  url       = ${?DB_URL}
  user      = "app_user"
  user      = ${?DB_USER}
  password  = "dev_app_password"
  password  = ${?DB_PASSWORD}
  pool-size = 10
  pool-size = ${?DB_POOL_SIZE}
}

auth {
  jwt-secret            = "dev-jwt-secret-change-in-production"
  jwt-secret            = ${?JWT_SECRET}
  token-expiry-seconds  = 3600
  token-expiry-seconds  = ${?TOKEN_EXPIRY_SECONDS}
  # Set to true to bypass real auth (development / POC environments only)
  mock-mode             = false
  mock-mode             = ${?AUTH_MOCK_MODE}
}

ingest {
  # "classpath:photos.csv" reads from the bundled resource inside the JAR
  csv-path  = "classpath:photos.csv"
  csv-path  = ${?INGEST_CSV_PATH}
  enabled   = true
  enabled   = ${?INGEST_ENABLED}
}

default-client {
  client-id     = "dev-client"
  client-id     = ${?DEFAULT_CLIENT_ID}
  client-secret = "dev-secret-change-me"
  client-secret = ${?DEFAULT_CLIENT_SECRET}
}
