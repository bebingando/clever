# pg_hba.conf — client authentication rules for the Clever Photos DB.
# Evaluated top-to-bottom; first match wins.
#
# TYPE   DATABASE     USER          ADDRESS          METHOD
#
# Superuser (postgres) may only connect via local Unix socket with peer auth.
# This prevents network-based superuser login entirely.
local   all          postgres                       peer

# Application service account: SCRAM-SHA-256 over TCP from the Docker network.
# "md5" is cryptographically broken; never use it in new deployments.
host    photos_db    app_user      10.0.0.0/8       scram-sha-256

# Read-only role for future replica traffic (nice-to-have; harmless to define now).
host    photos_db    readonly_user 10.0.0.0/8       scram-sha-256

# Explicit reject-all catch-all — makes the policy obvious.
host    all          all           0.0.0.0/0        reject
host    all          all           ::/0             reject
